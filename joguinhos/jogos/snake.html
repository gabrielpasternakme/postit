<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snake arena</title>
    <link rel="icon" type="image/png" href="snake.PNG">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            background: #0a0a0a;
            color: #00ff00;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 10px;
        }

        #score {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        canvas {
            background: #000;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 90vw;
            max-height: 90vw;
        }

        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95);
            padding: 30px;
            border: 3px solid #00ff00;
            text-align: center;
            z-index: 3000;
            width: 300px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            border-radius: 15px;
        }

        .modal h2 { margin-top: 0; text-transform: lowercase; }

        .modal button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: #00ff00;
            color: #000;
            border: none;
            font-weight: bold;
            font-family: 'Courier New', sans-serif;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        .modal button:hover {
            background: #00cc00;
            transform: scale(1.02);
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #00ff00;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        .controls {
            margin-top: 20px;
            display: none;
        }

        .controls div { display: flex; justify-content: center; }

        .controls button {
            width: 65px;
            height: 65px;
            background: #222;
            color: white;
            border: 2px solid #444;
            border-radius: 10px;
            font-size: 24px;
            margin: 5px;
            touch-action: manipulation;
        }

        .leaderboard {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            width: 280px;
            text-align: center;
        }

        ul { list-style: none; padding: 0; }
        li { 
            padding: 8px 0; 
            border-bottom: 1px dashed #333; 
            font-size: 14px; 
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <h1>snake arena 🐍</h1>

    <p id="score">seleciona o modo para começar aí cabaço</p>
<p id="score"></p>(o multiplayer é local pq foi dificio coloca no db)</p>
    <div id="startModal" class="modal">
        <h2>snake arena</h2>
        <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 20px;">escolha o modo de jogo:</p>
        <button id="btnSolo">1 player (infinito)</button>
        <button id="btnComp">multiplayer pc (competir)</button>
        <button id="btnBattle">multiplayer pc (batalha)</button>
    </div>

    <div id="gameOver" class="modal" style="display:none;">
        <h2 id="winnerMsg">vencedor!</h2>
        <p id="finalScore" style="color: #fff; margin-bottom: 15px;"></p>
        
        <input type="text" id="playerName" placeholder="seu nome para o ranking">
        
        <button id="btnRestart">jogar de novo</button>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <div class="controls">
        <div><button id="up">↑</button></div>
        <div>
            <button id="left">←</button>
            <button id="down">↓</button>
            <button id="right">→</button>
        </div>
    </div>

    <div class="leaderboard">
        <h2>🏆 top 10 🏆</h2>
        <ul id="leaderboard"></ul>
    </div>

    <script type="module" src="snake.js"></script>

</body>
</html>
